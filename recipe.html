<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Untitled-1.css">
    <title>Recipe Saver</title>
</head>
<body>

 
<header class="header">
 
    <div class="logo">
        <span class="logo-icon">🍽</span>
        <span class="logo-text">RecipeBook</span>
    </div>
 
    <nav class="nav" id="nav">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Favorites</a>
        <a href="#" class="nav-link">Shopping List</a>
    </nav>
 
    <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </button>
 
</header><section class="hero">
    <h1 class="hero-title">
        Discover, Save & Own <span>Delicious Recipes</span>
    </h1>
    <p class="hero-subtitle">
        The taste is the difeerence & The difference is the Taste.
    </p>
</section><main class="main">
 
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
 
        <button class="modal-close" id="modalClose">✕</button>
        <h2 id="modalTitle">Add New Recipe</h2>
 
        <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" id="recipeName" placeholder="e.g. Jollof Rice">
        </div>
 
        <div class="form-group">
            <label>Category</label>
            <select id="recipeCategory">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
                <option value="dessert">Dessert</option>
            </select>
        </div>
 
        <div class="form-group">
            <label>Cuisine</label>
            <input type="text" id="recipeCuisine" placeholder="e.g. Nigerian, Italian">
        </div>
 
        <div class="form-group">
            <label>Ingredients (one per line)</label>
            <textarea id="recipeIngredients" rows="5"
                      placeholder="Rice&#10;Tomatoes&#10;Onions"></textarea>
        </div>
 
        <div class="form-group">
            <label>Instructions</label>
            <textarea id="recipeInstructions" rows="4"
                      placeholder="Step by step..."></textarea>
        </div>
 
        <div class="form-group">
            <label>Emoji (optional)</label>
            <input type="text" id="recipeEmoji" placeholder="e.g. 🍚">
        </div>
 
        <button class="btn-submit" id="saveRecipeBtn">Save Recipe</button>
    </div>
</div>
    <div class="controls">
        <input type="text" id="searchInput"
               placeholder="Search recipes..." class="search-input">
 
        <select id="categoryFilter" class="category-select">
            <option value="all">All Categories</option>
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="snack">Snack</option>
            <option value="dessert">Dessert</option>
        </select>
 
        <button class="btn-add" id="openFormBtn">+ Add Recipe</button>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
 
</main><div class="modal-overlay" id="modalOverlay">
    <div class="modal">
 
        <button class="modal-close" id="modalClose">✕</button>
        <h2 id="modalTitle">Add New Recipe</h2>
 
        <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" id="recipeName" placeholder="e.g. Jollof Rice">
        </div>
 
        <div class="form-group">
            <label>Category</label>
            <select id="recipeCategory">
                <option value="breakfast">Breakfast</option>
                <option value="lunch">Lunch</option>
                <option value="dinner">Dinner</option>
                <option value="snack">Snack</option>
                <option value="dessert">Dessert</option>
            </select>
        </div>
 
        <div class="form-group">
            <label>Cuisine</label>
            <input type="text" id="recipeCuisine" placeholder="e.g. Nigerian, Italian">
        </div>
 
        <div class="form-group">
            <label>Ingredients (one per line)</label>
            <textarea id="recipeIngredients" rows="5"
                      placeholder="Rice&#10;Tomatoes&#10;Onions"></textarea>
        </div>
 
        <div class="form-group">
            <label>Instructions</label>
            <textarea id="recipeInstructions" rows="4"
                      placeholder="Step by step..."></textarea>
        </div>
 
        <div class="form-group">
            <label>Emoji (optional)</label>
            <input type="text" id="recipeEmoji" placeholder="e.g. 🍚">
        </div>
 
        <button class="btn-submit" id="saveRecipeBtn">Save Recipe</button>
    </div>
</div>
 
    <script src="app.js"></script>
</body>
</html>
  
    
</body>
</html>
